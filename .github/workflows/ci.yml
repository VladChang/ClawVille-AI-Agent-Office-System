name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Backend typecheck + scoped CI tests + build
        working-directory: backend
        run: |
          npm run typecheck
          npm run test:ci
          npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
          NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
          NEXT_PUBLIC_USE_MOCK_API: "false"
        run: npm run build

      - name: Docker compose config validation
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker compose config >/dev/null
          else
            echo "docker not available in runner; skipping compose validation"
          fi

      - name: Acceptance smoke (backend + frontend)
        shell: bash
        env:
          BACKEND_PORT: "3001"
          FRONTEND_PORT: "3000"
          FRONTEND_BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:3001/api
          ACCEPTANCE_CHECK_READY: "true"
          ACCEPTANCE_READY_MODE: graceful
          ACCEPTANCE_CHECK_METRICS: "true"
        run: |
          set -euo pipefail

          cleanup() {
            if [[ -n "${FRONTEND_PID:-}" ]]; then kill "$FRONTEND_PID" || true; fi
            if [[ -n "${BACKEND_PID:-}" ]]; then kill "$BACKEND_PID" || true; fi
          }
          trap cleanup EXIT

          (cd backend && PORT="$BACKEND_PORT" HOST=127.0.0.1 npm start > ../backend.log 2>&1) &
          BACKEND_PID=$!

          (cd frontend && PORT="$FRONTEND_PORT" NEXT_PUBLIC_API_BASE_URL="$API_BASE_URL" NEXT_PUBLIC_WS_URL="ws://localhost:${BACKEND_PORT}/ws" NEXT_PUBLIC_USE_MOCK_API="false" npm start > ../frontend.log 2>&1) &
          FRONTEND_PID=$!

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:${BACKEND_PORT}/api/health" >/dev/null; then
              break
            fi
            sleep 2
          done

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:${FRONTEND_PORT}" >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS "http://127.0.0.1:${BACKEND_PORT}/api/health" >/dev/null || {
            echo "Backend did not become ready";
            echo "--- backend.log ---";
            cat backend.log || true;
            exit 1;
          }

          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}" >/dev/null || {
            echo "Frontend did not become ready";
            echo "--- frontend.log ---";
            cat frontend.log || true;
            exit 1;
          }

          (cd frontend && npm run acceptance:e2e)

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "--- backend.log ---"
          cat backend.log || true
          echo "--- frontend.log ---"
          cat frontend.log || true
